<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
  text-align: center;
  background: black;
}

/* 🎥 FULL BACKGROUND VIDEO */
#bgvideo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100vh;
  width: auto;
  object-fit: contain;
  z-index: -1;
  filter: brightness(50%);
}

/* CONTENT */
.content {
  position: relative;
  z-index: 1;
  margin-top: 18vh;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO (AUTO PLAY ATTEMPT) -->
<video id="bgvideo" autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div class="content">
  <h1>💖 For You 💖</h1>
  <h2 id="text"></h2>

  <audio id="bgmusic" src="music.mp3" loop autoplay></audio>
</div>

<script>

// TYPEWRITER
const message = "You are my favorite person in the world 💖";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

</script>

</body>
</html>
