<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* BACKGROUND */
#bggif {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100vh;
  width: auto;
  z-index: -1;
  filter: brightness(45%);
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 3;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 22px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  font-size: 16px;
}

/* CARD */
.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  opacity: 0;
  transition: 0.5s ease;
  z-index: 4;

  padding: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  width: 80%;
  max-width: 380px;
}

/* POP EFFECT */
.card.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

/* IMAGE */
img {
  width: 75%;
  display: block;
  margin: 0 auto;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* TEXT */
#title {
  margin-bottom: 10px;
}

#caption {
  margin-top: 10px;
  font-size: 15px;
  min-height: 50px;
}

/* DOTS */
.dots {
  margin-top: 10px;
}
.dot {
  height: 10px;
  width: 10px;
  margin: 3px;
  display: inline-block;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
}
.active {
  background: white;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img src="background.gif" id="bggif">

<!-- MUSIC -->
<audio id="bgmusic" src="music.mp3" loop></audio>

<!-- INTRO -->
<div id="intro">
  <h1>Hi 💖</h1>
  <p>I made something for you…</p>
  <button id="openBtn">Click for memories</button>
</div>

<!-- SLIDESHOW -->
<div class="card" id="card">
  <div id="title"></div>
  <img id="slide" src="us1.jpg">
  <div id="caption"></div>
  <div class="dots" id="dots"></div>
</div>

<script>

// BUTTON FIX (reliable click)
document.getElementById("openBtn").addEventListener("click", function () {
  document.getElementById("intro").style.display = "none";

  const card = document.getElementById("card");
  card.classList.add("show");

  // play music (mobile-safe)
  const music = document.getElementById("bgmusic");
  music.play().catch(() => {});
});

// SLIDES
const slides = [
  { img: "us1.jpg", text: "This is where everything felt real to me. I didn’t just smile — I felt safe.", title: "💞 Moments I Treasure" },
  { img: "us2.jpg", text: "I go back to this memory a lot. It reminds me how lucky I am.", title: "💞 Moments I Treasure" },
  { img: "us3.jpg", text: "This moment is still one of my favorites. I’ll always treasure it.", title: "💞 Moments I Treasure" },

  { img: "her1.jpg", text: "You look really beautiful here. I can see the effort you put in.", title: "🌷 You, As I See You" },
  { img: "her2.jpg", text: "It’s not just how you look — it’s the confidence you carry.", title: "🌷 You, As I See You" },
  { img: "her3.jpg", text: "Even without all that, you’re still just as beautiful to me.", title: "🌷 You, As I See You" }
];

let index = 0;

// DOTS
const dotsContainer = document.getElementById("dots");
slides.forEach((_, i) => {
  const d = document.createElement("span");
  d.classList.add("dot");
  if (i === 0) d.classList.add("active");
  dotsContainer.appendChild(d);
});

const dots = document.querySelectorAll(".dot");

// UPDATE
function updateSlide() {
  const slide = slides[index];

  document.getElementById("slide").src = slide.img;
  document.getElementById("caption").innerText = slide.text;
  document.getElementById("title").innerText = slide.title;

  dots.forEach(d => d.classList.remove("active"));
  dots[index].classList.add("active");

  index = (index + 1) % slides.length;
}

// INITIAL
updateSlide();

// 7 SECOND TIMING (INCLUDING FIRST)
setTimeout(() => {
  setInterval(updateSlide, 7000);
}, 7000);

</script>

</body>
</html>
