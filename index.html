<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;
  background: black;
}

/* 🎞️ GIF BACKGROUND */
#bggif {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100vh;
  width: auto;
  z-index: -1;
  filter: brightness(50%);
}

/* CONTENT */
.content {
  position: relative;
  z-index: 1;
  margin-top: 18vh;
}

/* TEXT */
h2 {
  min-height: 40px;
}

/* HEARTS */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎞️ GIF BACKGROUND -->
<img src="background.gif" id="bggif">

<div class="content">
  <h1>💖 For You 💖</h1>
  <h2 id="text"></h2>

  <p>Tap anywhere to play music 🎵</p>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgmusic" src="music.mp3" loop></audio>

<script>

// ✍️ TYPEWRITER
const message = "You are my favorite person in the world 💖";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

// 🎵 MUSIC START ON FIRST CLICK (FIX FOR MOBILE)
function startMusic() {
  const music = document.getElementById("bgmusic");
  music.play();
  document.removeEventListener("click", startMusic);
}

document.addEventListener("click", startMusic);

// 💖 FLOATING HEARTS
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 250);

</script>

</body>
</html>
