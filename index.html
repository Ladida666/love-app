<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* BACKGROUND */
#bggif {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100vh;
  width: auto;
  z-index: -1;
  filter: brightness(45%);
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  margin-top: 8vh;
  display: inline-block;
  padding: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
}

/* IMAGE */
img {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* TEXT */
#title {
  font-size: 20px;
  margin-bottom: 10px;
}

#caption {
  margin-top: 10px;
  font-size: 15px;
  min-height: 50px;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
}

/* DOTS */
.dots {
  margin-top: 10px;
}
.dot {
  height: 10px;
  width: 10px;
  margin: 3px;
  display: inline-block;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
}
.active {
  background: white;
}
</style>
</head>

<body>

<img src="background.gif" id="bggif">

<div class="card">

  <div id="title">💞 Moments I Will Always Treasure</div>

  <img id="slide" src="us1.jpg">

  <div id="caption"></div>

  <audio id="bgmusic" src="music.mp3" loop></audio>

  <button onclick="startMusic()">Play Music 🎵</button>

  <div class="dots" id="dots"></div>

</div>

<script>

// 💖 ALL DATA
const slides = [

  // US SECTION
  {
    img: "us1.jpg",
    text: "This is where everything felt real to me. I didn’t just smile in this moment — I felt safe.",
    title: "💞 Moments I Will Always Treasure"
  },
  {
    img: "us2.jpg",
    text: "I go back to this memory a lot. It reminds me how lucky I am to have shared something this real with you.",
    title: "💞 Moments I Will Always Treasure"
  },
  {
    img: "us3.jpg",
    text: "Out of all the places I’ve been, this moment with you is still one of my favorites. I’ll always treasure it.",
    title: "💞 Moments I Will Always Treasure"
  },

  // HER SECTION
  {
    img: "her1.jpg",
    text: "You look really beautiful here. I can see the effort you put in, and it honestly makes you stand out even more.",
    title: "🌷 You, In Every Way I See You"
  },
  {
    img: "her2.jpg",
    text: "There’s something about you when you dress up like this — it’s not just how you look, it’s the confidence you carry too.",
    title: "🌷 You, In Every Way I See You"
  },
  {
    img: "her3.jpg",
    text: "But what I admire the most is that even without all of that, you’re still just as beautiful to me.",
    title: "🌷 You, In Every Way I See You"
  }

];

let index = 0;

// CREATE DOTS
const dotsContainer = document.getElementById("dots");
slides.forEach((_, i) => {
  const d = document.createElement("span");
  d.classList.add("dot");
  if (i === 0) d.classList.add("active");
  dotsContainer.appendChild(d);
});

const dots = document.querySelectorAll(".dot");

// UPDATE SLIDE
function updateSlide() {
  const slide = slides[index];

  document.getElementById("slide").src = slide.img;
  document.getElementById("caption").innerText = slide.text;
  document.getElementById("title").innerText = slide.title;

  dots.forEach(d => d.classList.remove("active"));
  dots[index].classList.add("active");

  index = (index + 1) % slides.length;
}

// AUTO PLAY
setInterval(updateSlide, 3000);

// INITIAL LOAD
updateSlide();

// MUSIC
function startMusic() {
  document.getElementById("bgmusic").play();
}

</script>

</body>
</html>
