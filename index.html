<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* BACKGROUND */
#bggif {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100vh;
  width: auto;
  z-index: -1;
  filter: brightness(45%);
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 5;
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  margin-top: 8vh;
  display: none;
  padding: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
}

/* IMAGE */
img {
  width: 75%;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* TEXT */
#title {
  font-size: 20px;
  margin-bottom: 10px;
}

#caption {
  margin-top: 10px;
  font-size: 15px;
  min-height: 50px;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
}

/* DOTS */
.dots {
  margin-top: 10px;
}
.dot {
  height: 10px;
  width: 10px;
  margin: 3px;
  display: inline-block;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
}
.active {
  background: white;
}
</style>
</head>

<body>

<img src="background.gif" id="bggif">

<!-- INTRO -->
<div id="intro">
  <h1>💖 For You 💖</h1>
  <button onclick="enter()">Open Memories</button>
</div>

<!-- MAIN -->
<div class="card" id="main">
  <div id="title"></div>
  <img id="slide" src="us1.jpg">
  <div id="caption"></div>
  <div class="dots" id="dots"></div>
</div>

<!-- MUSIC -->
<audio id="bgmusic" src="music.mp3" loop></audio>

<script>

// ENTER + START MUSIC
function enter() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("bgmusic").play();
}

// SLIDES DATA
const slides = [
  { img: "us1.jpg", text: "This is where everything felt real to me. I didn’t just smile — I felt safe.", title: "💞 Moments I Treasure" },
  { img: "us2.jpg", text: "I go back to this memory a lot. It reminds me how lucky I am.", title: "💞 Moments I Treasure" },
  { img: "us3.jpg", text: "This moment is still one of my favorites. I’ll always treasure it.", title: "💞 Moments I Treasure" },

  { img: "her1.jpg", text: "You look really beautiful here. I can see the effort you put in.", title: "🌷 You, As I See You" },
  { img: "her2.jpg", text: "It’s not just how you look — it’s the confidence you carry.", title: "🌷 You, As I See You" },
  { img: "her3.jpg", text: "Even without all that, you’re still just as beautiful to me.", title: "🌷 You, As I See You" }
];

let index = 0;

// CREATE DOTS
const dotsContainer = document.getElementById("dots");
slides.forEach((_, i) => {
  const d = document.createElement("span");
  d.classList.add("dot");
  if (i === 0) d.classList.add("active");
  dotsContainer.appendChild(d);
});

const dots = document.querySelectorAll(".dot");

// UPDATE SLIDE
function updateSlide() {
  const slide = slides[index];

  document.getElementById("slide").src = slide.img;
  document.getElementById("caption").innerText = slide.text;
  document.getElementById("title").innerText = slide.title;

  dots.forEach(d => d.classList.remove("active"));
  dots[index].classList.add("active");

  index = (index + 1) % slides.length;
}

// INITIAL LOAD
updateSlide();

// ⏱️ 7 SECOND INTERVAL (INCLUDING FIRST SLIDE)
setTimeout(() => {
  setInterval(updateSlide, 7000);
}, 7000);

</script>

</body>
</html>
