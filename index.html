<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love App 💖</title>
</head>

<body style="text-align:center; font-family: Arial; background-color: pink;">

  <h1>💖 My Love Page 💖</h1>
  <p>Click the button to start music</p>

  <!-- MUSIC -->
  <audio id="bgmusic" src="music.mp3" loop></audio>

  <!-- BUTTON -->
  <button onclick="playMusic()" style="padding:10px 20px; font-size:18px;">
    Play Music 🎵
  </button>

  <script>
    function playMusic() {
      const music = document.getElementById("bgmusic");
      music.play();
    }
  </script>

</body>
</html>
