<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
  text-align: center;
  background: linear-gradient(135deg, pink, #ff4d6d);
}

/* 🎥 CENTERED PHOTOSTRIP VIDEO */
#bgvideo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  height: 100vh;   /* fits full vertical strip */
  width: auto;     /* keeps aspect ratio */

  object-fit: contain; /* show full video */
  z-index: -1;

  filter: brightness(50%);
}

/* CONTENT */
.content {
  position: relative;
  z-index: 1;
  margin-top: 18vh;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  margin-top: 15px;
}

/* TEXT */
h2 {
  min-height: 40px;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop id="bgvideo">
  <source src="background.mp4" type="video/mp4">
</video>

<div class="content">
  <h1>💖 For You 💖</h1>
  <h2 id="text"></h2>

  <button onclick="document.getElementById('bgmusic').play()">
    Play Music 🎵
  </button>

  <audio id="bgmusic" src="music.mp3" loop></audio>
</div>

<script>

// ✍️ TYPEWRITER EFFECT
const message = "You are my favorite person in the world 💖";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

</script>

</body>
</html>
