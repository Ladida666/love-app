<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
  text-align: center;
}

/* 🎥 VIDEO BACKGROUND */
#bgvideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(50%);
}

/* CONTENT BOX */
.content {
  position: relative;
  z-index: 1;
  margin-top: 18vh;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  margin-top: 15px;
}

/* TYPE TEXT */
h2 {
  min-height: 40px;
}

/* FLOATING HEARTS */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop id="bgvideo">
  <source src="background.mp4" type="video/mp4">
</video>

<div class="content">
  <h1>💖 For You 💖</h1>
  <h2 id="text"></h2>

  <button onclick="document.getElementById('bgmusic').play()">
    Play Music 🎵
  </button>

  <audio id="bgmusic" src="music.mp3" loop></audio>
</div>

<script>

// ✍️ TYPEWRITER TEXT
const message = "You are my favorite person in the world 💖";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

// 💖 FLOATING HEARTS
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 250);

</script>

</body>
</html>
