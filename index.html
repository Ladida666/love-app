<script>

window.onload = function () {

  // BUTTON CLICK
  document.getElementById("openBtn").addEventListener("click", function () {
    document.getElementById("intro").style.display = "none";

    const card = document.getElementById("card");
    card.classList.add("show");

    // play music
    const music = document.getElementById("bgmusic");
    music.play().catch(() => {});
  });

  // SLIDES
  const slides = [
    { img: "us1.jpg", text: "This is where everything felt real to me. I didn’t just smile — I felt safe.", title: "💞 Moments I Treasure" },
    { img: "us2.jpg", text: "I go back to this memory a lot. It reminds me how lucky I am.", title: "💞 Moments I Treasure" },
    { img: "us3.jpg", text: "This moment is still one of my favorites. I’ll always treasure it.", title: "💞 Moments I Treasure" },

    { img: "her1.jpg", text: "You look really beautiful here. I can see the effort you put in.", title: "🌷 You, As I See You" },
    { img: "her2.jpg", text: "It’s not just how you look — it’s the confidence you carry.", title: "🌷 You, As I See You" },
    { img: "her3.jpg", text: "Even without all that, you’re still just as beautiful to me.", title: "🌷 You, As I See You" }
  ];

  let index = 0;

  const slideImg = document.getElementById("slide");
  const caption = document.getElementById("caption");
  const title = document.getElementById("title");
  const dotsContainer = document.getElementById("dots");

  // CREATE DOTS
  slides.forEach((_, i) => {
    const d = document.createElement("span");
    d.classList.add("dot");
    if (i === 0) d.classList.add("active");
    dotsContainer.appendChild(d);
  });

  const dots = document.querySelectorAll(".dot");

  // UPDATE SLIDE
  function updateSlide() {
    const slide = slides[index];

    slideImg.src = slide.img;
    caption.innerText = slide.text;
    title.innerText = slide.title;

    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");

    index = (index + 1) % slides.length;
  }

  // INITIAL LOAD
  updateSlide();

  // 7 SECONDS
  setTimeout(() => {
    setInterval(updateSlide, 7000);
  }, 7000);

};

</script>
